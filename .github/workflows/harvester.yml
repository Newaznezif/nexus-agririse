name: Nexus AgriRise Harvester

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *" # Runs every 24 hours at midnight
  workflow_dispatch: # Allows manual triggering

jobs:
  harvest:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r harvester/requirements.txt

    - name: Install Playwright Browsers
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-0 libglib2.0-dev
        playwright install chromium --with-deps

    - name: Run Harvester
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SERVICE_ROLE }}
      run: python harvester/main.py

    - name: Run Environmental Enrichment
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SERVICE_ROLE }}
      run: python harvester/environment_enricher.py

    - name: Run Normalization Engine
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SERVICE_ROLE }}
        CURRENCY_API_KEY: ${{ secrets.CURRENCY_API_KEY }}
      run: python harvester/normalization_engine.py

    - name: Run AI Intelligence Generation
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SERVICE_ROLE }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python harvester/intelligence_generator.py
